# ── Fly.io app config for GuildQuote ───────────────────────────────────────
# Single instance + one persistent volume holding the SQLite DB, uploaded
# logos, and generated PDFs. Litestream streams the DB offsite continuously.
#
# IMPORTANT: SQLite is single-writer. Keep this app at exactly ONE machine —
# do NOT scale to 2+ instances or enable autoscaling, or writes will conflict.

app = "guildquote"
primary_region = "bos"            # Boston — closest to Ryan/RP; change if desired

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  # adapter-node listens on this port; Fly routes 443/80 -> here
  PORT = "3000"
  # The volume mounts at /app/data, so DB + logos + pdfs share persistent storage
  DATABASE_URL = "/app/data/guildquote.db"
  # adapter-node needs the public origin for CSRF + absolute URLs
  ORIGIN = "https://guildquote.com"
  BASE_URL = "https://guildquote.com"
  PUBLIC_BASE_URL = "https://guildquote.com"
  GOOGLE_REDIRECT_URI = "https://guildquote.com/auth/google/callback"
  # Logo uploads are capped at 2MB in-app; lift adapter-node's 512K default
  BODY_SIZE_LIMIT = "8M"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false       # never stop — it's the only writer
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 200
    hard_limit = 250

  [[http_service.checks]]
    interval = "15s"
    timeout = "4s"
    grace_period = "20s"
    method = "GET"
    path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[mounts]
  source = "guildquote_data"
  destination = "/app/data"
